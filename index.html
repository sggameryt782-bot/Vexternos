<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Admin Panel</title>
    <style>
        :root {
            --dirt: #795548;
            --grass: #4caf50;
            --stone: #757575;
            --redstone: #f44336;
            --gold: #ffc107;
            --border: #212121;
        }

        body {
            background-color: #333;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        /* Container & Auth Box */
        .app-container {
            width: 90%;
            max-width: 900px;
            background: var(--stone);
            border: 6px solid var(--border);
            box-shadow: 12px 12px 0px rgba(0,0,0,0.5);
            padding: 30px;
        }

        .hidden { display: none !important; }

        h2 { text-transform: uppercase; letter-spacing: 2px; text-shadow: 3px 3px 0 var(--border); }

        /* Form Styling */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        input {
            padding: 15px;
            border: 4px solid var(--border);
            background: #eee;
            font-size: 1rem;
            font-weight: bold;
            outline: none;
        }

        /* The Buttons */
        .btn {
            padding: 15px;
            border: 4px solid var(--border);
            background: var(--grass);
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--border);
            transition: all 0.1s;
        }

        .btn:active {
            box-shadow: 0px 0px 0px var(--border);
            transform: translate(4px, 4px);
        }

        .btn-alt { background: var(--dirt); }
        .btn-danger { background: var(--redstone); }
        .btn-warn { background: var(--gold); color: black; }

        /* Control Panel Grid */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .panel-header {
            border-bottom: 4px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-badge {
            background: #000;
            color: #0f0;
            padding: 5px 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="auth-section">
        <h2 id="auth-title">System Login</h2>
        <div class="auth-form">
            <input type="text" id="username" placeholder="USERNAME">
            <input type="password" id="password" placeholder="PASSWORD">
            <button class="btn" onclick="handleAuth()">Login to Server</button>
            <button class="btn btn-alt" onclick="toggleAuth()" id="toggle-btn">Need to Register?</button>
        </div>
    </div>

    <div id="panel-section" class="hidden">
        <div class="panel-header">
            <h2>Server Control Panel</h2>
            <div class="status-badge">● SERVER ONLINE</div>
        </div>
        
        <div class="control-grid">
            <button class="btn btn-danger">Stop Server</button>
            <button class="btn btn-warn">Restart</button>
            <button class="btn">Start Backup</button>
            <button class="btn btn-alt">World Settings</button>
            <button class="btn">Player List</button>
            <button class="btn">Whitelist</button>
            <button class="btn btn-danger">Ban Hammer</button>
            <button class="btn">View Console</button>
            <button class="btn btn-alt">Plugin Manager</button>
            <button class="btn">Mod Installer</button>
            <button class="btn btn-warn">File Manager</button>
            <button class="btn">Resource Packs</button>
            <button class="btn">Network Usage</button>
            <button class="btn btn-alt">SQL Database</button>
            <button class="btn">API Access</button>
            <button class="btn btn-danger" onclick="logout()">Logout / Shutdown</button>
        </div>
    </div>

</div>

<script>
    let isLogin = true;

    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "System Login" : "Create Account";
        document.getElementById('toggle-btn').innerText = isLogin ? "Need to Register?" : "Back to Login";
    }

    function handleAuth() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if(user && pass) {
            // Simplified logic: Just check if fields aren't empty
            alert(isLogin ? "Welcome back, Admin!" : "Account created successfully!");
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('panel-section').classList.remove('hidden');
        } else {
            alert("Please enter credentials!");
        }
    }

    function logout() {
        if(confirm("Log out and return to main screen?")) {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('panel-section').classList.add('hidden');
        }
    }
</script>

</body>
</html>
