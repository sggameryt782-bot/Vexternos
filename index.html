<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryonix Nexus | Pro Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #00ff7f;
            --bg-dark: #02080e;
            --panel-bg: rgba(10, 25, 41, 0.8);
            --border: rgba(0, 210, 255, 0.2);
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --sidebar-width: 260px;
            --sidebar-collapsed: 80px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-dark); color: var(--text); overflow: hidden; height: 100vh; }

        /* AUTHENTICATION LAYER */
        #auth-overlay { position: fixed; inset: 0; z-index: 10000; background: var(--bg-dark); display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        .auth-card { background: var(--panel-bg); border: 1px solid var(--border); width: 420px; padding: 40px; border-radius: 24px; backdrop-filter: blur(20px); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .auth-title { font-size: 2.5rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--primary); margin-bottom: 8px; font-weight: 700; text-transform: uppercase; }
        .input-group input { width: 100%; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; }
        .btn-auth { width: 100%; padding: 15px; background: linear-gradient(to right, var(--primary), var(--secondary)); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: #000; text-transform: uppercase; margin-top: 10px; }
        
        .auth-toggle-link { margin-top: 25px; font-size: 0.9rem; color: var(--text-dim); }
        .text-btn { background: none; border: none; color: var(--secondary); font-weight: 700; text-decoration: underline; cursor: pointer; padding: 5px; }

        /* DASHBOARD STRUCTURE */
        #app-wrapper { display: grid; grid-template-columns: var(--sidebar-width) 1fr; height: 100vh; transition: var(--transition); display: none; }
        #app-wrapper.active { display: grid; opacity: 1; }
        #app-wrapper.collapsed { grid-template-columns: var(--sidebar-collapsed) 1fr; }

        /* SIDEBAR */
        .sidebar { background: rgba(5, 15, 25, 0.95); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .sidebar-header { padding: 30px 20px; display: flex; align-items: center; gap: 15px; }
        .logo-icon { min-width: 40px; height: 40px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 1.4rem; }
        .logo-text { font-weight: 800; font-size: 1.4rem; color: white; white-space: nowrap; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; margin: 4px 10px; border-radius: 12px; cursor: pointer; color: var(--text-dim); transition: 0.2s; }
        .nav-item i { width: 25px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: rgba(0, 210, 255, 0.1); color: var(--primary); }
        .nav-item.active { border-left: 4px solid var(--secondary); color: white; }
        .toggle-btn { position: absolute; bottom: 20px; right: 20px; background: var(--border); border: none; width: 35px; height: 35px; border-radius: 8px; color: white; cursor: pointer; }

        /* MAIN UI */
        .main-container { display: flex; flex-direction: column; background: radial-gradient(circle at top right, rgba(0, 255, 127, 0.03), transparent); overflow: hidden; }
        .top-bar { padding: 20px 40px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(8, 20, 35, 0.5); }
        .server-status { display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .status-dot.online { background: var(--secondary); box-shadow: 0 0 10px var(--secondary); }
        .status-dot.starting { background: #ffb800; box-shadow: 0 0 10px #ffb800; }
        .btn-pwr { padding: 10px 20px; border-radius: 8px; border: 1px solid transparent; font-weight: 800; cursor: pointer; }
        .btn-start { background: rgba(0, 255, 127, 0.1); color: var(--secondary); border-color: var(--secondary); }
        .btn-restart { background: rgba(0, 210, 255, 0.1); color: var(--primary); border-color: var(--primary); }
        .btn-stop { background: rgba(255, 51, 102, 0.1); color: #ff3366; border-color: #ff3366; }

        .server-switcher { background: rgba(0,0,0,0.5); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; margin-left: 20px; }

        .page-content { flex: 1; padding: 40px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--panel-bg); border: 1px solid var(--border); padding: 25px; border-radius: 20px; position: relative; }
        .terminal { background: #01050a; border-radius: 15px; height: 450px; display: flex; flex-direction: column; border: 1px solid #1a2332; }
        .term-logs { flex: 1; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; overflow-y: auto; color: #a1b0c0; }
        .term-input { padding: 15px; border-top: 1px solid #1a2332; display: flex; gap: 10px; align-items: center; }
        .term-input input { background: transparent; border: none; color: white; flex: 1; outline: none; }

        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: rgba(255,255,255,0.03); border-radius: 8px; margin-bottom: 8px; }
        .action-btn { background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 5px 10px; }

        .toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 11000; }
        .toast { background: var(--panel-bg); border-left: 4px solid var(--secondary); padding: 15px 25px; border-radius: 8px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); backdrop-filter: blur(10px); animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .toggle-switch { position: relative; width: 40px; height: 20px; background: #333; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-switch.active { background: var(--secondary); }
        .toggle-switch.active::after { transform: translateX(20px); }
    </style>
</head>
<body>

    <div class="toast-container" id="toasts"></div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 class="auth-title">CRYONIX</h1>
            
            <div id="ui-login">
                <div class="input-group"><label>Email Address</label><input type="email" placeholder="admin@cryonix.xyz"></div>
                <div class="input-group"><label>Password</label><input type="password" placeholder="••••••••"></div>
                <button type="button" class="btn-auth" onclick="enterApp()">Login to Nexus</button>
                <div class="auth-toggle-link">
                    Need a node? <button type="button" class="text-btn" onclick="toggleAuth('register')">Create Account</button>
                </div>
            </div>

            <div id="ui-register" style="display: none;">
                <div class="input-group"><label>Operator Name</label><input type="text" placeholder="John Doe"></div>
                <div class="input-group"><label>Email Address</label><input type="email" placeholder="user@cryonix.xyz"></div>
                <div class="input-group"><label>New Password</label><input type="password" placeholder="••••••••"></div>
                <button type="button" class="btn-auth" onclick="enterApp()">Deploy Account</button>
                <div class="auth-toggle-link">
                    Already synced? <button type="button" class="text-btn" onclick="toggleAuth('login')">Login Instead</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fas fa-microchip"></i></div>
                <div class="logo-text">CRYONIX</div>
            </div>
            <nav>
                <div class="nav-item active" onclick="nav('console', this)"><i class="fas fa-terminal"></i> <span>Console</span></div>
                <div class="nav-item" onclick="nav('files', this)"><i class="fas fa-folder"></i> <span>Files</span></div>
                <div class="nav-item" onclick="nav('plugins', this)"><i class="fas fa-plug"></i> <span>Plugins</span></div>
                <div class="nav-item" onclick="nav('scheduler', this)"><i class="fas fa-clock"></i> <span>Scheduler</span></div>
                <div class="nav-item" onclick="nav('backups', this)"><i class="fas fa-database"></i> <span>Backups</span></div>
                <div class="nav-item" onclick="nav('network', this)"><i class="fas fa-network-wired"></i> <span>Network</span></div>
                <div class="nav-item" onclick="nav('analytics', this)"><i class="fas fa-chart-line"></i> <span>Analytics</span></div>
                <div class="nav-item" onclick="nav('settings', this)"><i class="fas fa-cog"></i> <span>Settings</span></div>
            </nav>
            <button class="toggle-btn" onclick="toggleSide()"><i class="fas fa-chevron-left" id="side-icon"></i></button>
        </aside>

        <main class="main-container">
            <header class="top-bar">
                <div class="server-status">
                    <div class="status-dot" id="dot"></div>
                    <span id="st-txt">OFFLINE</span>
                    <select class="server-switcher" id="server-select" onchange="switchServer(this.value)">
                        <option value="0">Main Survival [1.20.1]</option>
                        <option value="1">Lobby Proxy [Bungee]</option>
                    </select>
                    <span style="margin-left: 15px; color: var(--primary); font-family: 'JetBrains Mono';" id="ip-display">IP: cryonixmc.qd.je</span>
                </div>
                <div class="power-controls">
                    <button class="btn-pwr btn-start" onclick="powerAction('START')">START</button>
                    <button class="btn-pwr btn-restart" onclick="powerAction('RESTART')">RESTART</button>
                    <button class="btn-pwr btn-stop" onclick="powerAction('STOP')">STOP</button>
                </div>
            </header>

            <div class="page-content">
                <div id="page-console" class="page active">
                    <div class="stat-grid">
                        <div class="card"><small>CPU</small><h2 id="st-cpu">0.0%</h2></div>
                        <div class="card"><small>RAM</small><h2 id="st-ram">0 / 16GB</h2></div>
                        <div class="card"><small>PLAYERS</small><h2 id="st-ply">0 / 100</h2></div>
                        <div class="card"><small>TPS</small><h2 id="st-tps">20.0</h2></div>
                        <div class="card"><small>PING</small><h2 id="st-ping">12ms</h2></div>
                    </div>
                    <div class="terminal">
                        <div class="term-logs" id="logs"></div>
                        <div class="term-input">
                            <span style="color:var(--secondary); font-weight:bold;">$</span>
                            <input type="text" placeholder="Type command..." id="cmd-in" onkeypress="handleCommand(event)">
                        </div>
                    </div>
                </div>

                <div id="page-files" class="page">
                    <div class="card">
                        <h3>/home/container/</h3>
                        <div id="file-list" style="margin-top:20px;"></div>
                    </div>
                </div>

                <div id="page-plugins" class="page">
                    <div class="card">
                        <h3>Plugin Installer</h3>
                        <div style="display:flex; gap:10px; margin: 15px 0;">
                            <input type="text" id="plug-search" placeholder="Search plugin..." style="flex:1; padding:10px; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:white; border-radius:8px;">
                            <button class="btn-auth" style="width:auto; padding:10px 20px; margin:0;" onclick="installPlugin()">Install</button>
                        </div>
                        <div id="plugin-list"></div>
                    </div>
                </div>

                <div id="page-network" class="page">
                    <div class="card">
                        <h3>Domain System</h3>
                        <input type="text" placeholder="play.yourdomain.com" style="width:100%; padding:10px; margin:15px 0; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:white;">
                        <button class="btn-auth" onclick="triggerCustomDomain()">Request Domain Activation</button>
                    </div>
                </div>

                <div id="page-analytics" class="page">
                    <div class="card" style="height:350px;">
                        <h3>Performance History</h3>
                        <canvas id="chart"></canvas>
                    </div>
                </div>

                <div id="page-settings" class="page">
                    <div class="card">
                        <h3>Resource Upgrade</h3>
                        <button class="btn-auth" onclick="triggerRAMUpgrade()">Claim +5GB RAM Upgrade</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CORE STATE
        let servers = [
            { id: 0, status: 'offline', logs: ["[System] Ready to boot..."], ip: "cryonixmc.qd.je" },
            { id: 1, status: 'offline', logs: ["[Proxy] Node standby."], ip: "lobby.cryonixmc.qd.je" }
        ];
        let currentSrv = 0;
        let files = [{name:'world', type:'folder'}, {name:'server.properties', type:'file'}];
        let plugins = [{name:'EssentialsX', enabled:true}];

        // AUTH LOGIC
        function toggleAuth(mode) {
            document.getElementById('ui-login').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('ui-register').style.display = mode === 'register' ? 'block' : 'none';
        }

        function enterApp() {
            // Force removal of overlay and show dashboard
            const overlay = document.getElementById('auth-overlay');
            const wrapper = document.getElementById('app-wrapper');
            
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                wrapper.style.display = 'grid';
                wrapper.classList.add('active');
                initSystem();
                notify("Connected", "Nexus session established.");
            }, 300);
        }

        // NAVIGATION
        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            el.classList.add('active');
        }

        function toggleSide() {
            document.getElementById('app-wrapper').classList.toggle('collapsed');
        }

        // SERVER LOGIC
        function switchServer(val) {
            currentSrv = parseInt(val);
            document.getElementById('ip-display').innerText = `IP: ${servers[currentSrv].ip}`;
            updateStatusUI();
            renderConsole();
        }

        function powerAction(act) {
            const s = servers[currentSrv];
            if(act === 'START') {
                s.status = 'starting'; updateStatusUI();
                appendLog("[System] Initializing JVM...", "var(--primary)");
                setTimeout(() => { 
                    s.status = 'online'; updateStatusUI();
                    appendLog("[Info] Server started on port 25565", "var(--secondary)");
                    startStats();
                }, 2000);
            } else if(act === 'STOP') {
                s.status = 'offline'; updateStatusUI();
                appendLog("[System] Process exited.", "#ff3366");
                stopStats();
            }
        }

        function updateStatusUI() {
            const s = servers[currentSrv].status;
            document.getElementById('dot').className = 'status-dot ' + s;
            document.getElementById('st-txt').innerText = s.toUpperCase();
        }

        function appendLog(msg, color="white") {
            const l = document.getElementById('logs');
            servers[currentSrv].logs.push(`<span style="color:${color}">${msg}</span>`);
            renderConsole();
        }

        function renderConsole() {
            const l = document.getElementById('logs');
            l.innerHTML = servers[currentSrv].logs.join('<br>');
            l.scrollTop = l.scrollHeight;
        }

        function handleCommand(e) {
            if(e.key === 'Enter') {
                const val = e.target.value;
                appendLog("> " + val, "var(--primary)");
                e.target.value = '';
            }
        }

        // OTHER SYSTEMS
        function renderFiles() {
            document.getElementById('file-list').innerHTML = files.map(f => `
                <div class="list-row"><span><i class="fas fa-file"></i> ${f.name}</span><i class="fas fa-ellipsis-v"></i></div>
            `).join('');
        }

        function installPlugin() {
            const name = document.getElementById('plug-search').value;
            if(name) {
                plugins.push({name, enabled:true});
                notify("Plugin Installed", name + " is now active.");
                document.getElementById('plug-search').value = '';
                renderPlugins();
            }
        }

        function renderPlugins() {
            document.getElementById('plugin-list').innerHTML = plugins.map(p => `
                <div class="list-row"><span>${p.name}.jar</span><div class="toggle-switch active"></div></div>
            `).join('');
        }

        function triggerCustomDomain() {
            notify("Redirecting", "Connecting to Discord Support...");
            setTimeout(() =>
