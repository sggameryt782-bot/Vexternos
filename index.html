<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nova Hosting</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  ⚡ Nova Hosting
</div>

<!-- SERVER NAME -->
<div class="server">
  <h2>MyServer.aternos.me</h2>
  <button class="connect">🔌 Connect</button>
</div>

<!-- STATUS -->
<div class="status offline">🔴 Offline</div>

<!-- BOOST -->
<div class="boost">
  Boost your server performance 🚀  
  <button>Get Free RAM</button>
</div>

<!-- START BUTTON -->
<button class="start">▶ Start</button>

<!-- CARDS -->
<div class="card">
  <div class="title">📡 Address</div>
  <div class="content">
    myserver.aternos.me:25565
    <button>Copy</button>
  </div>
</div>

<div class="card">
  <div class="title">⚙ Software</div>
  <div class="content">
    PaperMC
    <button>Change</button>
  </div>
</div>

<div class="card">
  <div class="title">🏷 Version</div>
  <div class="content">
    1.21.1
    <button>Change</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <span>❓ Help</span>
  <span class="active">⚡ Server</span>
  <span>👤 Account</span>
</div>

</body>
</html>
