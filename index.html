<!-- file: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MC Panel OP+</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:#fff; }
.container { display:flex; height:100vh; }

.sidebar {
    width:260px;
    background:#020617;
    padding:20px;
}
.sidebar h2 { color:#38bdf8; }
.sidebar button {
    width:100%;
    margin:6px 0;
    padding:10px;
    background:#1e293b;
    border:none;
    color:white;
    cursor:pointer;
}
.sidebar button.active { background:#38bdf8; }

.main { flex:1; padding:20px; overflow:auto; }

.card {
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

.hidden { display:none; }

.console {
    background:black;
    height:200px;
    overflow:auto;
    padding:10px;
    font-family:monospace;
}

input, select {
    padding:8px;
    margin:5px 0;
}

button.action {
    padding:8px;
    margin:5px;
    background:#38bdf8;
    border:none;
    cursor:pointer;
}

#auth { display:flex; justify-content:center; align-items:center; height:100vh; }
.auth-box { background:#1e293b; padding:30px; border-radius:10px; }
</style>
</head>

<body>

<!-- AUTH (UNCHANGED) -->
<div id="auth">
    <div class="auth-box">
        <h2>Register / Login</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">
<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>MC OP+</h2>
    <button onclick="openTab('dashboard', this)">Dashboard</button>
    <button onclick="openTab('consoleTab', this)">Console</button>
    <button onclick="openTab('files', this)">Files</button>
    <button onclick="openTab('plugins', this)">Plugins</button>
    <button onclick="openTab('backups', this)">Backups</button>
    <button onclick="openTab('scheduler', this)">Scheduler</button>
    <button onclick="openTab('database', this)">Database</button>
    <button onclick="openTab('network', this)">Network</button>
    <button onclick="openTab('analytics', this)">Analytics</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<div class="card">
<h3>Status: <span id="status">OFFLINE</span></h3>
<button class="action" onclick="startServer()">Start</button>
<button class="action" onclick="stopServer()">Stop</button>
<button class="action" onclick="restartServer()">Restart</button>
</div>
</div>

<!-- CONSOLE -->
<div id="consoleTab" class="tab hidden">
<div class="card">
<h3>Console</h3>
<div class="console" id="console"></div>
<input id="cmd">
<button onclick="sendCommand()">Send</button>
</div>
</div>

<!-- FILES -->
<div id="files" class="tab hidden">
<div class="card">
<h3>File Manager</h3>
<ul id="fileList"></ul>
<button onclick="addFile()">Add File</button>
</div>
</div>

<!-- PLUGINS -->
<div id="plugins" class="tab hidden">
<div class="card">
<h3>Plugins</h3>
<input id="pluginName" placeholder="Plugin name">
<button onclick="installPlugin()">Install</button>
<ul id="pluginsList"></ul>
</div>
</div>

<!-- BACKUPS -->
<div id="backups" class="tab hidden">
<div class="card">
<h3>Backups</h3>
<button onclick="createBackup()">Create Backup</button>
<ul id="backupList"></ul>
</div>
</div>

<!-- SCHEDULER -->
<div id="scheduler" class="tab hidden">
<div class="card">
<h3>Scheduler</h3>
<input id="task" placeholder="Command">
<button onclick="addTask()">Add Task</button>
<ul id="taskList"></ul>
</div>
</div>

<!-- DATABASE -->
<div id="database" class="tab hidden">
<div class="card">
<h3>Database</h3>
<button onclick="connectDB()">Connect</button>
<p id="dbStatus">Disconnected</p>
</div>
</div>

<!-- NETWORK -->
<div id="network" class="tab hidden">
<div class="card">
<h3>Network</h3>
<p>IP: 127.0.0.1</p>
<p>Port: 25565</p>
<button onclick="changeIP()">Change IP</button>
</div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="tab hidden">
<div class="card">
<h3>Analytics</h3>
<p>CPU: <span id="cpu">10%</span></p>
<p>RAM: <span id="ram">2GB</span></p>
<button onclick="updateStats()">Refresh</button>
</div>
</div>

</div>
</div>
</div>

<script>
// AUTH
function register(){ localStorage.setItem(username.value,password.value); alert("Registered"); }
function login(){
    if(localStorage.getItem(username.value)===password.value){
        auth.style.display="none";
        panel.classList.remove("hidden");
    } else alert("Wrong");
}
function logout(){ location.reload(); }

// TAB SYSTEM
function openTab(id,btn){
    document.querySelectorAll(".tab").forEach(t=>t.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");

    document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
}

// SERVER
function startServer(){ status.innerText="ONLINE"; log("Started"); }
function stopServer(){ status.innerText="OFFLINE"; log("Stopped"); }
function restartServer(){ log("Restarting..."); setTimeout(()=>log("Restarted"),1000); }

// CONSOLE
function log(msg){
    console.innerHTML+=msg+"<br>";
    console.scrollTop=console.scrollHeight;
}
function sendCommand(){ log("> "+cmd.value); }

// FILES
function addFile(){
    let li=document.createElement("li");
    li.innerText="new_file.txt";
    fileList.appendChild(li);
}

// PLUGINS
function installPlugin(){
    let li=document.createElement("li");
    li.innerText=pluginName.value;
    pluginsList.appendChild(li);
}

// BACKUPS
function createBackup(){
    let li=document.createElement("li");
    li.innerText="Backup "+Date.now();
    backupList.appendChild(li);
}

// SCHEDULER
function addTask(){
    let li=document.createElement("li");
    li.innerText=task.value;
    taskList.appendChild(li);
}

// DATABASE
function connectDB(){
    dbStatus.innerText="Connected";
}

// NETWORK
function changeIP(){
    alert("IP Changed (mock)");
}

// ANALYTICS
function updateStats(){
    cpu.innerText=Math.floor(Math.random()*100)+"%";
    ram.innerText=Math.floor(Math.random()*16)+"GB";
}
</script>

</body>
</html>
