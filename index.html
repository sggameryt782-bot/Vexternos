<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Hosting Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>⚡ Nova Panel</h2>
  <a onclick="showPage('dashboard')">🏠 Dashboard</a>
  <a onclick="showPage('console')">💻 Console</a>
  <a onclick="showPage('files')">📂 Files</a>
  <a onclick="showPage('settings')">⚙️ Settings</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <div class="card">
    <h2>Server Status</h2>
    <div class="status offline">🔴 Offline</div>

    <button class="btn start">Start Server</button>
    <button class="btn stop">Stop Server</button>
    <button class="btn restart">Restart Server</button>
  </div>

  <div class="card">
    <h3>Performance</h3>
    <div class="bar"><div class="fill"></div></div>
  </div>
</div>

<!-- CONSOLE -->
<div id="console" class="page">
  <div class="card">
    <h2>Console</h2>
    <div class="console-box">> Server logs...</div>
    <input placeholder="Enter command...">
    <button class="btn send">Send</button>
  </div>
</div>

<!-- FILES -->
<div id="files" class="page">
  <div class="card">
    <h2>File Manager</h2>
    <button class="btn">Upload</button>
    <button class="btn">Delete</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
  <div class="card">
    <h2>Settings</h2>
    <label>Server Name</label>
    <input placeholder="My Server">

    <label>RAM (GB)</label>
    <input type="range" min="1" max="16">
  </div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
