<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Control Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* Header */
.header {
  background: #1e293b;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* Card */
.card {
  background: #1e293b;
  margin: 15px;
  padding: 20px;
  border-radius: 12px;
}

/* Status */
.status {
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  background: red;
}

/* Button */
.btn {
  padding: 12px;
  border: none;
  border-radius: 8px;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

.start {
  background: #22c55e;
}

.stop {
  background: #ef4444;
}

/* Input */
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

/* Box */
.box {
  background: #0f172a;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
}
</style>

</head>

<body>

<div class="header">⚡ My Server Panel</div>

<div class="card">
  <h3>Server Status</h3>
  <div class="status">🔴 Offline</div>
  <button class="btn start">Start Server</button>
  <button class="btn stop">Stop Server</button>
</div>

<div class="card">
  <h3>Address</h3>
  <div class="box">myserver.aternos.me:12345</div>
</div>

<div class="card">
  <h3>Software</h3>
  <div class="box">PaperMC</div>
</div>

<div class="card">
  <h3>Version</h3>
  <div class="box">1.21.1</div>
</div>

<div class="card">
  <h3>Console</h3>
  <input placeholder="Enter command...">
</div>

</body>
</html>
