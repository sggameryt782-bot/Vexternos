<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blue Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h2>⚡ Nova Hosting</h2>
  </div>

  <!-- SERVER NAME -->
  <div class="server-box">
    <h1>MyServer.aternos.me</h1>
    <button class="connect">🔌 Connect</button>
  </div>

  <!-- STATUS -->
  <div class="status offline">🔴 Offline</div>

  <!-- BOOST -->
  <div class="boost">
    Boost your server performance with extra RAM ⚡
    <button>Get RAM Boost</button>
  </div>

  <!-- START BUTTON -->
  <button class="start-btn">▶ Start</button>

  <!-- CARD -->
  <div class="card">
    <div class="card-header">📡 Address</div>
    <div class="card-body">
      MyServer.aternos.me:25565
      <button class="copy">Copy</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">⚙ Software</div>
    <div class="card-body">
      PaperMC
      <button class="change">Change</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">🏷 Version</div>
    <div class="card-body">
      1.21.1
      <button class="change">Change</button>
    </div>
  </div>

</div>

</body>
</html>
