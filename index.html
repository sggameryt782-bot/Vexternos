<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID-TITAN // MC ORCHESTRATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --void-black: #020408;
            --glass-white: rgba(255, 255, 255, 0.05);
            --danger: #ff0055;
            --success: #00ffaa;
            --warning: #ffcc00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--void-black);
            color: #e0e0e0;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* --- BACKGROUND PARTICLES --- */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a1122 0%, #020408 100%);
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 1s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .auth-orb-container {
            width: 450px;
            padding: 50px;
            background: rgba(10, 15, 25, 0.8);
            border: 1px solid rgba(0, 210, 255, 0.2);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 210, 255, 0.1);
            position: relative;
        }

        .auth-orb-container::before {
            content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-blue), transparent, var(--neon-purple));
            z-index: -1; border-radius: 32px; opacity: 0.3;
        }

        .logo-text { font-family: 'Orbitron', sans-serif; font-size: 2rem; letter-spacing: 8px; margin-bottom: 40px; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }

        .input-field {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.4s;
        }

        .login-btn:hover { letter-spacing: 5px; box-shadow: 0 0 30px var(--neon-blue); }

        /* --- DASHBOARD LAYOUT --- */
        #dashboard {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: grid;
            grid-template-columns: 80px 1fr 300px;
            transform: translateY(100%);
            transition: 1s cubic-bezier(0.8, 0, 0.2, 1);
            background: var(--void-black);
        }

        .app-active #login-screen { transform: translateY(-100%); opacity: 0; }
        .app-active #dashboard { transform: translateY(0); }

        /* Sidebar Blade */
        .sidebar {
            background: rgba(5, 10, 20, 0.8);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            z-index: 10;
        }

        .nav-icon {
            width: 50px; height: 50px; margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 15px; cursor: pointer; transition: 0.3s;
            color: #555; font-size: 1.2rem; border: 1px solid transparent;
        }

        .nav-icon:hover, .nav-icon.active {
            color: var(--neon-blue);
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        /* Center Content */
        .main-view { padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, rgba(0, 210, 255, 0.03), transparent); }

        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }

        /* Power Center (Right Panel) */
        .power-panel {
            background: rgba(10, 15, 25, 0.9);
            border-left: 1px solid rgba(255,255,255,0.05);
            padding: 30px;
            display: flex; flex-direction: column; align-items: center;
        }

        .energy-orb {
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle, var(--neon-blue) 0%, transparent 70%);
            margin: 40px 0; position: relative;
            box-shadow: 0 0 50px rgba(0, 210, 255, 0.2);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; filter: brightness(1.5); }
        }

        .energy-orb.offline { background: radial-gradient(circle, var(--danger) 0%, transparent 70%); box-shadow: 0 0 50px rgba(255, 0, 85, 0.2); }

        /* Tactical Buttons */
        .tactical-grid { width: 100%; display: grid; grid-template-columns: 1fr; gap: 15px; }
        .tac-btn {
            padding: 15px; background: var(--glass-white); border: 1px solid rgba(255,255,255,0.1);
            color: white; border-radius: 12px; cursor: pointer; text-align: left;
            font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 1px; transition: 0.3s;
        }

        .tac-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-blue); transform: translateX(5px); }
        .tac-btn.start { border-left: 4px solid var(--success); }
        .tac-btn.stop { border-left: 4px solid var(--danger); }

        /* Stats Cards */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--glass-white); padding: 25px; border-radius: 20px;
            border-bottom: 2px solid transparent; transition: 0.3s;
        }
        .stat-card:hover { background: rgba(255,255,255,0.08); border-bottom-color: var(--neon-blue); }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 700; margin-top: 10px; font-family: 'Orbitron'; }

        /* Terminal Console */
        .terminal-wrap {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px; padding: 20px; height: 400px; display: flex; flex-direction: column;
        }
        .terminal-output { flex: 1; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.9rem; color: #aaa; margin-bottom: 15px; }
        .terminal-input {
            background: transparent; border: none; border-top: 1px solid rgba(255,255,255,0.1);
            padding: 10px 0; color: var(--neon-blue); font-family: 'Courier New'; outline: none; width: 100%;
        }

        /* TOASTS */
        #notification-box { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .toast {
            background: rgba(10, 20, 30, 0.9); border-left: 4px solid var(--neon-blue);
            padding: 15px 25px; border-radius: 8px; margin-bottom: 10px;
            animation: slideLeft 0.5s forwards; backdrop-filter: blur(10px);
        }
        @keyframes slideLeft { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div id="notification-box"></div>

    <section id="login-screen">
        <div class="auth-orb-container">
            <div class="logo-text">VOID-TITAN</div>
            <input type="text" id="user" class="input-field" placeholder="COMMANDER NAME">
            <input type="password" id="pass" class="input-field" placeholder="SECURE KEY">
            <button class="login-btn" onclick="Titan.auth()">INITIALIZE LINK</button>
            <p style="margin-top: 25px; color: #555; font-size: 0.8rem; cursor: pointer;">NEW INTERFACE ACCESS?</p>
        </div>
    </section>

    <section id="dashboard">
        <aside class="sidebar">
            <div class="nav-icon active" onclick="Titan.switchTab('main')">◈</div>
            <div class="nav-icon" onclick="Titan.switchTab('files')">📂</div>
            <div class="nav-icon" onclick="Titan.switchTab('plugins')">🧩</div>
            <div class="nav-icon" onclick="Titan.switchTab('network')">🌐</div>
            <div class="nav-icon" onclick="Titan.switchTab('settings')">⚙</div>
            <div class="nav-icon" style="margin-top: auto; color: var(--danger);" onclick="location.reload()">⏻</div>
        </aside>

        <main class="main-view" id="view-container">
            <div id="tab-main" class="tab-content">
                <div class="header-panel">
                    <div>
                        <h1 style="font-family: 'Orbitron'; font-size: 2rem;">CRYO-SERVER-01</h1>
                        <p style="color: var(--neon-blue); font-size: 0.9rem;">LOCATION: NODE-FRANKFURT-04</p>
                    </div>
                    <div style="text-align: right;">
                        <div style="color: #888;">UPTIME</div>
                        <div id="uptime-clock" style="font-family: 'Orbitron';">00:00:00</div>
                    </div>
                </div>

                <div class="stats-container">
                    <div class="stat-card">
                        <div class="stat-label">Neural CPU Load</div>
                        <div class="stat-value" id="stat-cpu">0%</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Memory Buffer</div>
                        <div class="stat-value" id="stat-ram" style="color: var(--neon-purple);">0.0 GB</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Pilots</div>
                        <div class="stat-value" id="stat-players">0 / 100</div>
                    </div>
                </div>

                <div class="terminal-wrap">
                    <div class="terminal-output" id="logs">
                        <div>[SYSTEM] INITIALIZING TITAN TERMINAL...</div>
                        <div>[SYSTEM] AWAITING COMMANDS.</div>
                    </div>
                    <input type="text" class="terminal-input" id="cmd-in" placeholder="ENTER COMMAND..." onkeydown="if(event.key==='Enter') Titan.exec()">
                </div>
            </div>
        </main>

        <aside class="power-panel">
            <h3 style="font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px;">CORE STATUS</h3>
            <div class="energy-orb offline" id="core-orb"></div>
            <div id="status-tag" style="font-weight: bold; margin-bottom: 40px; color: var(--danger);">DISCONNECTED</div>

            <div class="tactical-grid">
                <button class="tac-btn start" onclick="Titan.power('start')">POWER ON SYSTEM</button>
                <button class="tac-btn" onclick="Titan.power('restart')">REBOOT CORE</button>
                <button class="tac-btn stop" onclick="Titan.power('stop')">EMERGENCY HALT</button>
                <div style="margin-top: 20px; height: 1px; background: rgba(255,255,255,0.05);"></div>
                <button class="tac-btn">CREATE ARCHIVE</button>
                <button class="tac-btn">DEPLOY PLUGINS</button>
            </div>
        </aside>
    </section>

    <script>
        // --- VOID LOGIC ENGINE ---
        const State = {
            online: false,
            cpu: 0, ram: 0, players: 0,
            logs: []
        };

        const Titan = {
            auth() {
                const u = document.getElementById('user').value;
                if(!u) return this.notify("IDENTIFIER REQUIRED", "danger");
                
                this.notify("LINK ESTABLISHED: WELCOME COMMANDER", "success");
                document.body.classList.add('app-active');
                this.startMetrics();
            },

            notify(msg, type="success") {
                const box = document.getElementById('notification-box');
                const t = document.createElement('div');
                t.className = 'toast';
                t.style.borderLeftColor = `var(--${type})`;
                t.innerText = msg;
                box.appendChild(t);
                setTimeout(() => t.remove(), 4000);
            },

            power(action) {
                if(action === 'start') {
                    if(State.online) return;
                    this.notify("POWERING UP TITAN CORE...", "warning");
                    this.log("CORE: Starting primary engines...");
                    setTimeout(() => {
                        State.online = true;
                        this.updateUI();
                        this.log("CORE: Server synchronized. Port 25565 open.");
                        this.notify("TITAN CORE ONLINE", "success");
                    }, 2000);
                } else if(action === 'stop') {
                    State.online = false;
                    this.updateUI();
                    this.notify("CORE OFFLINE", "danger");
                    this.log("CORE: System shutdown complete.");
                }
            },

            updateUI() {
                const orb = document.getElementById('core-orb');
                const tag = document.getElementById('status-tag');
                if(State.online) {
                    orb.classList.remove('offline');
                    tag.innerText = "ONLINE / SECURE";
                    tag.style.color = "var(--success)";
                } else {
                    orb.classList.add('offline');
                    tag.innerText = "DISCONNECTED";
                    tag.style.color = "var(--danger)";
                    document.getElementById('stat-cpu').innerText = "0%";
                    document.getElementById('stat-ram').innerText = "0.0 GB";
                }
            },

            log(msg) {
                const out = document.getElementById('logs');
                const line = document.createElement('div');
                line.innerHTML = `<span style="color:var(--neon-blue)">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
                out.appendChild(line);
                out.scrollTop = out.scrollHeight;
            },

            exec() {
                const input = document.getElementById('cmd-in');
                if(!input.value) return;
                this.log(`USER: ${input.value}`);
                const cmd = input.value.toLowerCase();
                input.value = "";
                
                setTimeout(() => {
                    if(cmd === "help") this.log("AI: Commands: status, clear, list, reboot");
                    else if(cmd === "status") this.log(`AI: System Health 100%. Neural link stable.`);
                    else this.log("AI: Command sent to Minecraft kernel.");
                }, 500);
            },

            startMetrics() {
                setInterval(() => {
                    if(!State.online) return;
                    const cpu = (Math.random() * 25 + 5).toFixed(1);
                    const ram = (Math.random() * 2 + 3).toFixed(1);
                    const p = Math.floor(Math.random() * 20) + 5;
                    
                    document.getElementById('stat-cpu').innerText = cpu + "%";
                    document.getElementById('stat-ram').innerText = ram + " GB";
                    document.getElementById('stat-players').innerText = p + " / 100";
                }, 3000);
            },

            switchTab(t) {
                this.notify(`ACCESSING ${t.toUpperCase()} MODULE...`);
            }
        };

        // --- BACKGROUND CANVAS LOGIC ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.globalAlpha = Math.random() * 0.5 + 0.2;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.y -= s.speed;
                if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }

        window.onresize = initStars;
        initStars();
        drawStars();
    </script>
</body>
    </html>
