<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaHost Panel</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    background:#0b0f13;
    color:white;
    font-family:sans-serif;
    margin:0;
}

/* Sidebar */
.sidebar {
    width:260px;
    background:#161b22;
    height:100vh;
    position:fixed;
    left:-300px;
    top:0;
    transition:0.4s;
    z-index:50;
}
.sidebar.active {
    left:0;
}

/* Overlay */
.overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    z-index:40;
}
.overlay.active {
    display:block;
}

/* Nav */
.nav-item {
    padding:12px 20px;
    cursor:pointer;
    color:#aaa;
    transition:0.3s;
}
.nav-item:hover {
    color:#3b82f6;
    transform:translateX(5px);
}

/* Page */
.page {display:none;}
.page.active {display:block;}

/* Buttons */
.btn {
    padding:10px;
    border-radius:10px;
    font-weight:bold;
    transition:0.2s;
}
.btn:active {transform:scale(0.95);}

</style>
</head>

<body>

<!-- Overlay -->
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <h2 style="padding:20px;">⚡ NovaHost</h2>

    <div class="nav-item" onclick="showPage('home')">Dashboard</div>
    <div class="nav-item" onclick="showPage('console')">Console</div>
    <div class="nav-item" onclick="showPage('files')">Files</div>
    <div class="nav-item" onclick="showPage('players')">Players</div>
    <div class="nav-item" onclick="showPage('backup')">Backups</div>
    <div class="nav-item" onclick="showPage('settings')">Settings</div>
</div>

<!-- Main -->
<div style="margin-left:0; padding:20px;">

    <!-- Header -->
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button onclick="toggleSidebar()" style="font-size:20px;">☰</button>

        <div id="status" style="color:red;">● Offline</div>

        <div>
            <button onclick="startServer()" class="btn" style="background:green;">Start</button>
            <button onclick="restartServer()" class="btn" style="background:orange;">Restart</button>
            <button onclick="stopServer()" class="btn" style="background:red;">Stop</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="page-home" class="page active">
        <h2>Dashboard</h2>

        <p>Server Address: myserver.novahost.me</p>

        <h3>RAM Control</h3>
        <input type="range" min="512" max="16384" value="2048" style="width:100%;">
        <p>512MB → 16GB</p>
    </div>

    <!-- Console -->
    <div id="page-console" class="page">
        <h2>Console</h2>

        <div style="background:black; height:200px; padding:10px; overflow:auto;">
            <p>[System] Server offline</p>
        </div>

        <input type="text" placeholder="Command..." style="width:80%;">
        <button class="btn" style="background:blue;">Send</button>
    </div>

    <!-- Files -->
    <div id="page-files" class="page">
        <h2>File Manager</h2>
        <p>Upload / Edit files</p>
    </div>

    <!-- Players -->
    <div id="page-players" class="page">
        <h2>🚧 Coming Soon</h2>
    </div>

    <!-- Backup -->
    <div id="page-backup" class="page">
        <h2>🚧 Coming Soon</h2>
    </div>

    <!-- Settings -->
    <div id="page-settings" class="page">
        <h2>Settings</h2>

        <p>Max Players</p>
        <input type="number" value="20">

        <p>Server Name</p>
        <input type="text" value="Nova Server">
    </div>

</div>

<!-- JS -->
<script>
let open = false;

function toggleSidebar(){
    let s = document.getElementById("sidebar");
    let o = document.getElementById("overlay");

    open = !open;

    if(open){
        s.classList.add("active");
        o.classList.add("active");
    } else {
        s.classList.remove("active");
        o.classList.remove("active");
    }
}

function showPage(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById("page-"+page).classList.add("active");
}

function startServer(){
    let s = document.getElementById("status");
    s.innerText="● Starting...";
    s.style.color="yellow";

    setTimeout(()=>{
        s.innerText="● Online";
        s.style.color="lime";
    },2000);
}

function stopServer(){
    let s = document.getElementById("status");
    s.innerText="● Stopping...";

    setTimeout(()=>{
        s.innerText="● Offline";
        s.style.color="red";
    },2000);
}

function restartServer(){
    let s = document.getElementById("status");
    s.innerText="● Restarting...";

    setTimeout(()=>{
        s.innerText="● Online";
        s.style.color="lime";
    },3000);
}
</script>

</body>
</html>
