<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Control Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Minecraft Server Control Panel</h1>
        <nav>
            <ul>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#console">Console</a></li>
                <li><a href="#settings">Settings</a></li>
                <li><a href="#file-manager">File Manager</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="dashboard">
            <h2>Dashboard</h2>
            <p>Welcome to your Minecraft server control panel. Here you can monitor your server's status.</p>
        </section>
        <section id="console">
            <h2>Console</h2>
            <textarea rows="10" cols="50" placeholder="Enter commands here..."></textarea>
            <button>Send Command</button>
        </section>
        <section id="settings">
            <h2>Settings</h2>
            <form>
                <label for="maxPlayers">Max Players:</label>
                <input type="number" id="maxPlayers" name="maxPlayers" min="1" max="100"><br>
                <label for="serverIp">Server IP:</label>
                <input type="text" id="serverIp" name="serverIp"><br>
                <button type="submit">Save Settings</button>
            </form>
        </section>
        <section id="file-manager">
            <h2>File Manager</h2>
            <p>Manage your server files here.</p>
            <button>Upload Files</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Minecraft Server Management</p>
    </footer>
</body>
</html>
