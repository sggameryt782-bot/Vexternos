<!-- file: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MC Panel X</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#05070f;
    color:#fff;
}

/* LAYOUT */
.container { display:flex; height:100vh; }

.sidebar {
    width:240px;
    background:#02040a;
    padding:15px;
    border-right:1px solid #0f172a;
}

.sidebar h2 {
    color:#00f0ff;
    text-shadow:0 0 10px #00f0ff;
}

.sidebar button {
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#0f172a;
    border:none;
    color:#ccc;
    cursor:pointer;
    border-radius:8px;
    transition:.2s;
}

.sidebar button:hover,
.sidebar button.active {
    background:#00f0ff;
    color:#000;
    box-shadow:0 0 15px #00f0ff;
}

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; }

/* TOPBAR */
.topbar {
    padding:15px;
    background:#02040a;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #0f172a;
}

.topbar h1 { margin:0; }

.btn {
    padding:8px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.start { background:#00ff88; }
.stop { background:#ff3b3b; }
.restart { background:#ffaa00; }

/* CONTENT */
.content { padding:20px; overflow:auto; }

.card {
    background:#0f172a;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 0 10px #00f0ff22;
}

/* CONSOLE */
.console {
    background:#000;
    height:300px;
    overflow:auto;
    padding:10px;
    font-family:monospace;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.stat {
    padding:15px;
    background:#02040a;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px #00f0ff33;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>MC X</h2>
    <button onclick="tab('console',this)" class="active">Console</button>
    <button onclick="tab('files',this)">Files</button>
    <button onclick="tab('software',this)">Software</button>
    <button onclick="tab('backups',this)">Backups</button>
    <button onclick="tab('network',this)">Network</button>
    <button onclick="tab('startup',this)">Startup</button>
    <button onclick="tab('settings',this)">Settings</button>
    <button onclick="tab('analytics',this)">Analytics</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">
    <h1>Server Panel</h1>
    <div>
        <button class="btn start" onclick="start()">Start</button>
        <button class="btn restart" onclick="restart()">Restart</button>
        <button class="btn stop" onclick="stop()">Stop</button>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- CONSOLE -->
<div id="console" class="page">
<div class="card">
<div class="console" id="log"></div>
<input id="cmd" placeholder="Type command">
<button onclick="send()">Send</button>
</div>

<div class="grid">
<div class="stat">Status: <span id="status">Offline</span></div>
<div class="stat">CPU: <span id="cpu">0%</span></div>
<div class="stat">RAM: <span id="ram">0GB</span></div>
</div>
</div>

<!-- FILES -->
<div id="files" class="page hidden">
<div class="card">
<h3>Files</h3>
<ul id="fileList"></ul>
<button onclick="addFile()">Add File</button>
</div>
</div>

<!-- SOFTWARE -->
<div id="software" class="page hidden">
<div class="card">
<h3>Software</h3>
<select onchange="setSoft(this.value)">
<option>Paper</option>
<option>Spigot</option>
<option>Forge</option>
</select>
</div>
</div>

<!-- BACKUPS -->
<div id="backups" class="page hidden">
<div class="card">
<button onclick="backup()">Create Backup</button>
<ul id="backupsList"></ul>
</div>
</div>

<!-- NETWORK -->
<div id="network" class="page hidden">
<div class="card">
<p>IP: 127.0.0.1:25565</p>
<button onclick="changeIP()">Change</button>
</div>
</div>

<!-- STARTUP -->
<div id="startup" class="page hidden">
<div class="card">
<input placeholder="Startup Command">
</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="page hidden">
<div class="card">
<label>RAM</label>
<input type="range" min="1" max="16" onchange="setRam(this.value)">
</div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="page hidden">
<div class="grid">
<div class="stat">Players: 12/50</div>
<div class="stat">TPS: 20</div>
<div class="stat">Ping: 30ms</div>
</div>
</div>

</div>
</div>
</div>

<script>
// TAB
function tab(id,btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');

    document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

// SERVER
function start(){ status.innerText="Online"; log("Server started"); }
function stop(){ status.innerText="Offline"; log("Server stopped"); }
function restart(){ log("Restarting..."); setTimeout(()=>log("Restarted"),1000); }

// CONSOLE
function log(t){ logDiv.innerHTML+=t+"<br>"; logDiv.scrollTop=9999; }
const logDiv = document.getElementById("log");

function send(){ log("> "+cmd.value); }

// FILES
function addFile(){
    let li=document.createElement("li");
    li.innerText="file_"+Date.now();
    fileList.appendChild(li);
}

// SOFTWARE
function setSoft(v){ log("Software set to "+v); }

// BACKUP
function backup(){
    let li=document.createElement("li");
    li.innerText="Backup "+Date.now();
    backupsList.appendChild(li);
}

// NETWORK
function changeIP(){ alert("Changed"); }

// SETTINGS
function setRam(v){ ram.innerText=v+"GB"; }

// STATS LOOP
setInterval(()=>{
    cpu.innerText=Math.floor(Math.random()*100)+"%";
    ram.innerText=Math.floor(Math.random()*16)+"GB";
},2000);
</script>

</body>
</html>
