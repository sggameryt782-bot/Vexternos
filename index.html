<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA-V // PRIME CONTROL</title>
    <style>
        :root {
            --bg: #05070a;
            --panel: rgba(15, 20, 28, 0.7);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --secondary: #7000ff;
            --text: #e0e6ed;
            --text-dim: #94a3b8;
            --danger: #ff4655;
            --success: #00ff95;
            --warning: #ffb800;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', 'Inter', sans-serif; }
        
        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(112, 0, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* --- UTILITIES --- */
        .glass { background: var(--panel); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; }
        .neon-text { text-shadow: 0 0 10px var(--accent); color: var(--accent); }
        .btn-glow { box-shadow: 0 0 15px var(--accent-glow); }
        .hidden { display: none !important; }

        /* --- AUTH SYSTEM --- */
        #auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            transition: 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .auth-card {
            width: 400px;
            padding: 40px;
            text-align: center;
            animation: authFloat 4s ease-in-out infinite;
        }

        @keyframes authFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .auth-card h1 { font-size: 2rem; letter-spacing: 4px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            padding: 14px;
            color: white;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .primary-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, var(--secondary), var(--accent));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .primary-btn:hover { transform: scale(1.02); filter: brightness(1.2); }

        /* --- MAIN LAYOUT --- */
        #main-app {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            opacity: 0;
            transform: scale(1.1);
            transition: 0.8s ease;
        }

        #main-app.active { opacity: 1; transform: scale(1); }

        /* Sidebar */
        .sidebar {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: rgba(0,0,0,0.2);
        }

        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 50px; padding: 0 10px; }
        .brand-logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; box-shadow: 0 0 15px var(--accent); }

        .nav-link {
            padding: 14px 18px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-dim);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--glass);
            color: var(--accent);
            padding-left: 25px;
        }

        /* Topbar */
        .topbar {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
        }

        .server-status-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 10px var(--danger); }
        .status-dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .control-btns { display: flex; gap: 12px; }
        .ctrl-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; background: var(--glass); color: white; font-size: 0.8rem; transition: 0.3s; }
        .ctrl-btn:hover { background: white; color: black; }

        /* Main Content */
        .content-area { padding: 40px; overflow-y: auto; }
        .view { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Grid */
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 30px; }
        .stat-card { padding: 25px; }
        .stat-val { font-size: 1.8rem; font-weight: 800; margin-top: 10px; }

        /* Live Graph Simulation */
        .graph-container { height: 60px; width: 100%; margin-top: 15px; }
        .graph-line { fill: none; stroke: var(--accent); stroke-width: 2; transition: 0.5s; }

        /* Console */
        .console-box {
            background: #000;
            height: 450px;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            border: 1px solid var(--border);
            color: #ccc;
            margin-bottom: 15px;
        }

        .console-input-wrap { display: flex; gap: 10px; }

        /* File Manager */
        .file-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; }
        .file-item {
            background: var(--panel);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }
        .file-item:hover { background: rgba(255,255,255,0.05); }

        /* Notifications */
        #toast-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        .toast {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--accent);
            padding: 15px 25px;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Version Selector Custom */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card glass">
            <h1 class="neon-text">NEBULA-V</h1>
            <div id="auth-form">
                <div class="input-group">
                    <label>Commander Identifier</label>
                    <input type="text" id="auth-user" placeholder="Enter username...">
                </div>
                <div class="input-group">
                    <label>Security Key</label>
                    <input type="password" id="auth-pass" placeholder="••••••••">
                </div>
                <button class="primary-btn btn-glow" onclick="Nebula.handleAuth()">Establish Connection</button>
                <p style="margin-top: 20px; font-size: 0.8rem; color: var(--text-dim); cursor: pointer;" onclick="Nebula.toggleAuthMode()">
                    New Commander? <span style="color: var(--accent)">Request Access</span>
                </p>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <div id="main-app">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-logo"></div>
                <div style="font-weight: 800; letter-spacing: 2px;">NEBULA-V</div>
            </div>

            <nav>
                <div class="nav-link active" onclick="Router.go('dash')"><span>⊞</span> Dashboard</div>
                <div class="nav-link" onclick="Router.go('console')"><span>&gt;_</span> Console</div>
                <div class="nav-link" onclick="Router.go('files')"><span>📁</span> Files</div>
                <div class="nav-link" onclick="Router.go('plugins')"><span>🧩</span> Plugins</div>
                <div class="nav-link" onclick="Router.go('network')"><span>🌐</span> Network</div>
                <div class="nav-link" onclick="Router.go('settings')"><span>⚙</span> Settings</div>
            </nav>

            <div style="margin-top: auto;">
                <div class="nav-link" onclick="Nebula.logout()" style="color: var(--danger);"><span>⏻</span> Disconnect</div>
            </div>
        </aside>

        <main style="display: flex; flex-direction: column;">
            <header class="topbar">
                <div class="server-info">
                    <span style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">Instance #01</span>
                    <h3 id="current-server-name">Cryonix-Alpha</h3>
                </div>

                <div class="server-status-pill">
                    <div class="status-dot" id="status-indicator"></div>
                    <span id="status-text">OFFLINE</span>
                </div>

                <div class="control-btns">
                    <button class="ctrl-btn" onclick="Server.start()" style="border-color: var(--success);">Start</button>
                    <button class="ctrl-btn" onclick="Server.restart()" style="border-color: var(--warning);">Restart</button>
                    <button class="ctrl-btn" onclick="Server.stop()" style="border-color: var(--danger);">Stop</button>
                </div>
            </header>

            <div class="content-area" id="view-port">
                </div>
        </main>
    </div>

    <script>
        /**
         * NEBULA CORE LOGIC
         */
        const AppState = {
            user: JSON.parse(localStorage.getItem('nebula_user')) || null,
            isOnline: false,
            serverName: "Cryonix-Node-01",
            ramUsage: 0,
            cpuUsage: 0,
            players: 0,
            maxPlayers: 50,
            history: { cpu: [], ram: [] }
        };

        const Nebula = {
            init() {
                if (AppState.user) {
                    this.showApp();
                }
                Router.go('dash');
                this.startMetricsLoop();
            },

            handleAuth() {
                const u = document.getElementById('auth-user').value;
                const p = document.getElementById('auth-pass').value;
                if (!u || !p) return this.toast("Missing Credentials", "danger");

                AppState.user = { name: u };
                localStorage.setItem('nebula_user', JSON.stringify(AppState.user));
                this.toast(`Welcome back, Commander ${u}`, "success");
                this.showApp();
            },

            showApp() {
                document.getElementById('auth-overlay').style.transform = 'translateY(-100%)';
                document.getElementById('main-app').classList.add('active');
            },

            logout() {
                localStorage.removeItem('nebula_user');
                location.reload();
            },

            toast(msg, type = "accent") {
                const container = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = 'toast';
                t.style.borderLeftColor = `var(--${type})`;
                t.innerText = msg;
                container.appendChild(t);
                setTimeout(() => t.remove(), 4000);
            },

            startMetricsLoop() {
                setInterval(() => {
                    if (AppState.isOnline) {
                        AppState.cpuUsage = (Math.random() * 30 + 10).toFixed(1);
                        AppState.ramUsage = (Math.random() * 2 + 1.5).toFixed(2);
                        AppState.players = Math.floor(Math.random() * 15) + 5;
                    } else {
                        AppState.cpuUsage = 0; AppState.ramUsage = 0; AppState.players = 0;
                    }
                    this.updateMetricsUI();
                }, 2000);
            },

            updateMetricsUI() {
                const cpuEl = document.getElementById('val-cpu');
                if (cpuEl) cpuEl.innerText = AppState.cpuUsage + "%";
                const ramEl = document.getElementById('val-ram');
                if (ramEl) ramEl.innerText = AppState.ramUsage + " GB";
                const playEl = document.getElementById('val-players');
                if (playEl) playEl.innerText = `${AppState.players} / ${AppState.maxPlayers}`;
            }
        };

        /**
         * SERVER ACTION LOGIC
         */
        const Server = {
            start() {
                if (AppState.isOnline) return;
                Nebula.toast("Initializing Boot Sequence...", "warning");
                this.log("System: Starting kernel...");
                setTimeout(() => {
                    AppState.isOnline = true;
                    this.updateStatus();
                    Nebula.toast("Server Online", "success");
                    this.log("System: Minecraft 1.21.1 Started on Port 25565");
                }, 2000);
            },
            stop() {
                AppState.isOnline = false;
                this.updateStatus();
                Nebula.toast("Server Terminated", "danger");
                this.log("System: Process killed.");
            },
            restart() {
                this.stop();
                setTimeout(() => this.start(), 1000);
            },
            updateStatus() {
                const dot = document.getElementById('status-indicator');
                const txt = document.getElementById('status-text');
                dot.className = AppState.isOnline ? 'status-dot online' : 'status-dot';
                txt.innerText = AppState.isOnline ? 'ONLINE' : 'OFFLINE';
            },
            log(msg) {
                const box = document.getElementById('console-out');
                if (box) {
                    const line = document.createElement('div');
                    line.innerHTML = `<span style="color:var(--accent)">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
                    box.appendChild(line);
                    box.scrollTop = box.scrollHeight;
                }
            }
        };

        /**
         * ROUTING SYSTEM (SPA)
         */
        const Router = {
            views: {
                dash: () => `
                    <div class="view">
                        <div class="stat-grid">
                            <div class="stat-card glass">
                                <p style="color:var(--text-dim)">CPU UTILIZATION</p>
                                <div class="stat-val neon-text" id="val-cpu">0%</div>
                                <div class="graph-container">
                                    <svg viewBox="0 0 100 20" preserveAspectRatio="none" style="width:100%; height:100%">
                                        <path d="M0 20 L10 15 L20 18 L30 10 L40 15 L50 5 L60 12 L70 8 L80 15 L90 10 L100 18" class="graph-line"></path>
                                    </svg>
                                </div>
                            </div>
                            <div class="stat-card glass">
                                <p style="color:var(--text-dim)">MEMORY ALLOCATION</p>
                                <div class="stat-val" id="val-ram" style="color:var(--secondary)">0 GB</div>
                            </div>
                            <div class="stat-card glass">
                                <p style="color:var(--text-dim)">ACTIVE PLAYERS</p>
                                <div class="stat-val" id="val-players">0 / 50</div>
                            </div>
                        </div>

                        <div class="glass" style="padding:30px;">
                            <h3>Quick Actions</h3>
                            <div class="grid-2" style="margin-top:20px;">
                                <div class="ctrl-btn" style="padding:20px; text-align:center">Create Backup</div>
                                <div class="ctrl-btn" style="padding:20px; text-align:center">Update Version</div>
                            </div>
                        </div>
                    </div>
                `,
                console: () => `
                    <div class="view">
                        <div class="console-box" id="console-out">
                            <div>Welcome to the Nebula-V Secure Terminal.</div>
                            <div>Type 'help' for commands.</div>
                        </div>
                        <div class="console-input-wrap">
                            <input type="text" id="cmd-in" placeholder="Enter server command..." onkeydown="if(event.key==='Enter') Router.execCmd()">
                            <button class="primary-btn" style="width:120px" onclick="Router.execCmd()">Send</button>
                        </div>
                    </div>
                `,
                files: () => `
                    <div class="view">
                        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                            <h2>File System</h2>
                            <button class="ctrl-btn">+ New File</button>
                        </div>
                        <div class="file-list">
                            <div class="file-item"><span>📁 world</span><span>DIR</span></div>
                            <div class="file-item"><span>📁 plugins</span><span>DIR</span></div>
                            <div class="file-item"><span>📄 server.properties</span><span>4 KB</span></div>
                            <div class="file-item"><span>📄 spigot.yml</span><span>12 KB</span></div>
                            <div class="file-item"><span>📄 ops.json</span><span>1 KB</span></div>
                        </div>
                    </div>
                `,
                settings: () => `
                    <div class="view glass" style="padding:40px;">
                        <h2>Instance Configuration</h2>
                        <div class="input-group" style="margin-top:30px;">
                            <label>Assigned RAM (GB)</label>
                            <input type="range" min="1" max="16" value="4"
