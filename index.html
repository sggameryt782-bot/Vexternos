<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NekoStrike Panel</title>

<style>
body{margin:0;font-family:sans-serif;background:#05070f;color:#fff}
.hidden{display:none}
.container{display:flex;height:100vh}

/* AUTH */
#auth{display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#0f172a;padding:30px;border-radius:12px;box-shadow:0 0 20px #00f0ff55}
input{display:block;margin:10px 0;padding:10px;width:200px;background:#02040a;color:#fff;border:none}

/* SIDEBAR */
.sidebar{width:230px;background:#02040a;padding:15px}
.sidebar button{width:100%;padding:10px;margin:5px 0;background:#0f172a;border:none;color:#ccc;border-radius:8px}
.sidebar button:hover{background:#00f0ff;color:#000;box-shadow:0 0 10px #00f0ff}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column}
.top{padding:10px;background:#02040a;display:flex;justify-content:space-between}
.content{padding:15px;overflow:auto}

.card{background:#0f172a;padding:15px;border-radius:10px;margin-bottom:10px;box-shadow:0 0 10px #00f0ff22}
.console{background:black;height:200px;overflow:auto;padding:10px;font-family:monospace}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.stat{background:#02040a;padding:10px;border-radius:8px;text-align:center}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:#00f0ff;color:#000;padding:10px;border-radius:8px;display:none}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
<div class="box">
<h2>Login / Register</h2>
<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="reg()">Register</button>
<button onclick="log()">Login</button>
</div>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">
<div class="container">

<div class="sidebar">
<button onclick="tab('console')">Console</button>
<button onclick="tab('files')">Files</button>
<button onclick="tab('plugins')">Plugins</button>
<button onclick="tab('backup')">Backups</button>
<button onclick="tab('network')">Network</button>
<button onclick="tab('settings')">Settings</button>
<button onclick="tab('analytics')">Analytics</button>
</div>

<div class="main">

<div class="top">
<div>
<button onclick="start()">Start</button>
<button onclick="restart()">Restart</button>
<button onclick="stop()">Stop</button>
</div>
<div>IP: play.cryonixhs.xyz</div>
</div>

<div class="content">

<!-- CONSOLE -->
<div id="console">
<div class="card">
<div class="console" id="log"></div>
<input id="cmd"><button onclick="send()">Send</button>
</div>

<div class="grid">
<div class="stat">Status: <span id="status">Offline</span></div>
<div class="stat">CPU: <span id="cpu">0%</span></div>
<div class="stat">RAM: <span id="ram">2GB</span></div>
<div class="stat">Players: 12/50</div>
</div>
</div>

<!-- FILES -->
<div id="files" class="hidden">
<div class="card">
<button onclick="addFile()">Add File</button>
<ul id="filesList"></ul>
</div>
</div>

<!-- PLUGINS -->
<div id="plugins" class="hidden">
<div class="card">
<input id="pl"><button onclick="addPlugin()">Install</button>
<ul id="plist"></ul>
</div>
</div>

<!-- BACKUP -->
<div id="backup" class="hidden">
<div class="card">
<button onclick="backup()">Create Backup</button>
<ul id="blist"></ul>
</div>
</div>

<!-- NETWORK -->
<div id="network" class="hidden">
<div class="card">
<p>Default: play.cryonixhs.xyz</p>
<input id="domain" placeholder="Custom domain">
<button onclick="setDomain()">Apply</button>
</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="hidden">
<div class="card">
<h3>RAM Upgrade</h3>
<button onclick="upgrade()">Upgrade to 16GB</button>
</div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="hidden">
<div class="grid">
<div class="stat">TPS: 20</div>
<div class="stat">Ping: 30ms</div>
<div class="stat">Uptime: 2h</div>
</div>
</div>

</div>
</div>
</div>
</div>

<div id="toast"></div>

<script>
// AUTH
function reg(){localStorage.setItem(u.value,p.value);toast("Registered")}
function log(){
if(localStorage.getItem(u.value)===p.value){
auth.style.display="none";panel.classList.remove("hidden")
}else toast("Wrong Login")
}

// TAB
function tab(id){
document.querySelectorAll('.content > div').forEach(d=>d.classList.add('hidden'))
document.getElementById(id).classList.remove('hidden')
}

// SERVER
function start(){status.innerText="Online";logMsg("Started")}
function stop(){status.innerText="Offline";logMsg("Stopped")}
function restart(){logMsg("Restarting...");setTimeout(()=>logMsg("Restarted"),1000)}

// CONSOLE
function logMsg(t){log.innerHTML+=t+"<br>";log.scrollTop=9999}
function send(){logMsg("> "+cmd.value)}

// FILES
function addFile(){
let li=document.createElement("li");li.innerText="file_"+Date.now()
filesList.appendChild(li)
}

// PLUGINS
function addPlugin(){
let li=document.createElement("li");li.innerText=pl.value
plist.appendChild(li)
}

// BACKUP
function backup(){
let li=document.createElement("li");li.innerText="backup_"+Date.now()
blist.appendChild(li)
}

// DOMAIN
function setDomain(){
toast("Join Discord first!");
window.open("https://discord.gg/wzWWDq2HU")
}

// RAM UPGRADE
function upgrade(){
window.open("https://youtube.com/@nekostrikesg?si=C5DEbxOnHCsWag2o")
setTimeout(()=>{
toast("Subscribed? Wait 24 hours → You will get +5GB RAM")
},1000)
}

// TOAST
function toast(t){
toastBox.innerText=t
toastBox.style.display="block"
setTimeout(()=>toastBox.style.display="none",3000)
}

// STATS
setInterval(()=>{
cpu.innerText=Math.floor(Math.random()*100)+"%"
ram.innerText=Math.floor(Math.random()*16)+"GB"
},2000)

const toastBox=document.getElementById("toast")
</script>

</body>
</html>
