<!-- file: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minecraft Panel OP</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: #fff;
}
.container {
    display: flex;
    height: 100vh;
}
.sidebar {
    width: 250px;
    background: #020617;
    padding: 20px;
}
.sidebar h2 {
    color: #38bdf8;
}
.sidebar button {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: #1e293b;
    border: none;
    color: white;
    cursor: pointer;
}
.main {
    flex: 1;
    padding: 20px;
}
.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}
button.action {
    margin: 5px;
    padding: 10px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}
#auth {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.auth-box {
    background: #1e293b;
    padding: 30px;
    border-radius: 10px;
}
input {
    display: block;
    margin: 10px 0;
    padding: 10px;
    width: 200px;
}
.hidden { display: none; }
.console {
    background: black;
    height: 150px;
    overflow-y: auto;
    padding: 10px;
    font-family: monospace;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
    <div class="auth-box">
        <h2 id="authTitle">Register</h2>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">
    <div class="container">
        <div class="sidebar">
            <h2>MC Panel OP</h2>
            <button onclick="showTab('dashboard')">Dashboard</button>
            <button onclick="showTab('consoleTab')">Console</button>
            <button onclick="showTab('files')">Files</button>
            <button onclick="logout()">Logout</button>
        </div>

        <div class="main">

            <!-- DASHBOARD -->
            <div id="dashboard">
                <div class="card">
                    <h3>Status: <span id="status">OFFLINE</span></h3>
                    <button class="action" onclick="startServer()">Start</button>
                    <button class="action" onclick="stopServer()">Stop</button>
                    <button class="action" onclick="restartServer()">Restart</button>
                </div>

                <div class="card">
                    <h3>Settings</h3>
                    RAM: <input type="range" min="1" max="16" value="4" onchange="setRAM(this.value)">
                    <span id="ramVal">4GB</span>
                    <br><br>
                    Version:
                    <select onchange="setVersion(this.value)">
                        <option>1.20</option>
                        <option>1.19</option>
                        <option>1.18</option>
                    </select>
                </div>

                <div class="card">
                    <h3>Players</h3>
                    <ul id="players">
                        <li>Steve</li>
                        <li>Alex</li>
                    </ul>
                </div>
            </div>

            <!-- CONSOLE -->
            <div id="consoleTab" class="hidden">
                <div class="card">
                    <h3>Console</h3>
                    <div class="console" id="console"></div>
                    <input id="cmd" placeholder="Enter command">
                    <button onclick="sendCommand()">Send</button>
                </div>
            </div>

            <!-- FILES -->
            <div id="files" class="hidden">
                <div class="card">
                    <h3>Files</h3>
                    <ul>
                        <li>server.properties</li>
                        <li>world/</li>
                        <li>plugins/</li>
                    </ul>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
let serverOn = false;

// AUTH
function register() {
    let u = username.value;
    let p = password.value;
    localStorage.setItem(u, p);
    alert("Registered!");
}

function login() {
    let u = username.value;
    let p = password.value;
    if (localStorage.getItem(u) === p) {
        auth.style.display = "none";
        panel.classList.remove("hidden");
    } else {
        alert("Wrong login");
    }
}

function logout() {
    location.reload();
}

// TABS
function showTab(tab) {
    ["dashboard","consoleTab","files"].forEach(t=>{
        document.getElementById(t).classList.add("hidden");
    });
    document.getElementById(tab).classList.remove("hidden");
}

// SERVER CONTROL
function startServer() {
    serverOn = true;
    status.innerText = "ONLINE";
    log("Server started");
}

function stopServer() {
    serverOn = false;
    status.innerText = "OFFLINE";
    log("Server stopped");
}

function restartServer() {
    log("Restarting...");
    setTimeout(()=>{
        log("Server restarted");
    },1000);
}

// SETTINGS
function setRAM(val) {
    ramVal.innerText = val + "GB";
    log("RAM set to " + val);
}

function setVersion(v) {
    log("Version set to " + v);
}

// CONSOLE
function log(msg) {
    let c = document.getElementById("console");
    c.innerHTML += msg + "<br>";
    c.scrollTop = c.scrollHeight;
}

function sendCommand() {
    let cmd = document.getElementById("cmd").value;
    log("> " + cmd);
}
</script>

</body>
    </html>
